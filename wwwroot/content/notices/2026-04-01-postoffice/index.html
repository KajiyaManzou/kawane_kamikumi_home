<p>資料を持っていく必要があります。</p>
<ul>
<li>常会規約</li>

<li>前班長の印鑑</li>
<li>新班長（自分）の印鑑</li>
</ul>
<p>印鑑は「東川根上組」の印鑑を作れば印鑑の変更はしなくてもいいと言われました。</p>
<p>「毎年変更しないで済む方法はないですか？」と聞くと「通帳の名義を変えないで運用しているとところもあるようです」との返事でした。</p>
